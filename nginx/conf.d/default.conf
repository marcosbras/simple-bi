server {
    listen 80 default_server;
    server_name smartreport.centraldoaplicativo.com.br localhost;

    # Necessário para o certbot validar o domínio (webroot challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto redireciona para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2 default_server;
    server_name smartreport.centraldoaplicativo.com.br localhost;

    ssl_certificate     /etc/letsencrypt/live/smartreport.centraldoaplicativo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartreport.centraldoaplicativo.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://simple-bi:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        # Acima do timeout de 120s do proxy /api/erp/* em server.js, para não
        # cortar a conexão antes do próprio app desistir da fonte de dados.
        proxy_read_timeout  130s;
        proxy_send_timeout  130s;
    }
}

