# Proxy reverso para a fonte de dados (ERP) da empresa "Caye Me Colchões".
# O backend real roda em servidor externo (IP 34.230.78.208), na porta 3007.
# O path da requisição varia (ex: /sgbrbi/vendas/detalhada, /sgbrbi/compras, ...)
# e é repassado integralmente ao backend.

server {
    listen 80;
    server_name dbcayemecolchoes.centraldoaplicativo.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name dbcayemecolchoes.centraldoaplicativo.com.br;

    ssl_certificate     /etc/letsencrypt/live/dbcayemecolchoes.centraldoaplicativo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dbcayemecolchoes.centraldoaplicativo.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        # O ERP não envia headers de CORS, então o nginx supre isso
        # para as chamadas feitas direto do navegador (index.html).
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Length'               0;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        proxy_pass http://34.230.78.208:3007;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

